name: Refresh live profile

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-profile-refresh
  cancel-in-progress: true

jobs:
  refresh:
    name: Generate public engineering pulse
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile source
        uses: actions/checkout@v7

      - name: Generate live SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/generate_live_signal.py \
            --username Himath2002 \
            --output "${RUNNER_TEMP}/live-signal.svg"

      - name: Publish generated asset
        env:
          LIVE_ASSET: ${{ runner.temp }}/live-signal.svg
        run: |
          git fetch origin live-profile:refs/remotes/origin/live-profile
          git switch --track origin/live-profile
          cp "${LIVE_ASSET}" assets/live-signal.svg
          git add assets/live-signal.svg

          if git diff --cached --quiet; then
            echo "The live signal is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh public engineering pulse"
          git push origin live-profile
