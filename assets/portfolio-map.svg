  <rect x="72" y="626" width="1296" height="42" rx="21" fill="#173F3B"/>
  <text x="720" y="653" fill="#EAF5F2" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="650" text-anchor="middle">FOCUSED VERIFICATION  •  CI  •  SECURITY POLICY  •  CHANGELOG  •  VERSIONED RELEASE  •  PROJECT-SPECIFIC DOCUMENTATION</text>
