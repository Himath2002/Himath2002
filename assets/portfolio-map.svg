<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="700" viewBox="0 0 1440 700" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio across four engineering areas</title>
  <desc id="desc">Six projects grouped into Android experiences, algorithms and data structures, C systems and state, and relational data integrity.</desc>
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="135%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#12312F" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="700" rx="32" fill="#F1F7F5"/>
  <text x="72" y="76" fill="#163D39" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="760">Six projects, four engineering perspectives</text>
  <text x="72" y="112" fill="#56706D" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Different problem spaces, one consistent standard: visible architecture and verifiable behavior.</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" filter="url(#cardShadow)">
    <g transform="translate(72 154)">
      <rect width="632" height="205" rx="24" fill="#FFFFFF" stroke="#CBE1DC"/>
      <rect width="12" height="205" rx="6" fill="#168C7D"/>
      <text x="42" y="46" fill="#168C7D" font-size="15" font-weight="750" letter-spacing="2">ANDROID EXPERIENCES</text>
      <text x="42" y="88" fill="#173C3A" font-size="27" font-weight="760">MealMetric · Gridline Four</text>
      <text x="42" y="128" fill="#4A6864" font-size="18">Material 3 interfaces · lifecycle-aware state</text>
      <text x="42" y="160" fill="#4A6864" font-size="18">Room persistence · pure Java rules · offline-first scope</text>
    </g>

    <g transform="translate(736 154)">
      <rect width="632" height="205" rx="24" fill="#FFFFFF" stroke="#CBE1DC"/>
      <rect width="12" height="205" rx="6" fill="#2F7393"/>
      <text x="42" y="46" fill="#2F7393" font-size="15" font-weight="750" letter-spacing="2">ALGORITHMS &amp; STRUCTURES</text>
      <text x="42" y="88" fill="#173C3A" font-size="27" font-weight="760">AeroRoute Algorithms</text>
      <text x="42" y="128" fill="#4A6864" font-size="18">Bounded breadth-first search · weighted graph</text>
      <text x="42" y="160" fill="#4A6864" font-size="18">Custom collections · three correctness-checked sorts</text>
    </g>

    <g transform="translate(72 389)">
      <rect width="632" height="205" rx="24" fill="#FFFFFF" stroke="#CBE1DC"/>
      <rect width="12" height="205" rx="6" fill="#6D5BD0"/>
      <text x="42" y="46" fill="#6D5BD0" font-size="15" font-weight="750" letter-spacing="2">SYSTEMS &amp; STATE</text>
      <text x="42" y="88" fill="#173C3A" font-size="27" font-weight="760">Terminal Pursuit · Pursuit Rewind</text>
      <text x="42" y="128" fill="#4A6864" font-size="18">Portable C11 · POSIX terminal input · bounded rules</text>
      <text x="42" y="160" fill="#4A6864" font-size="18">Replayable state · defensive parsing · sanitizers</text>
    </g>

    <g transform="translate(736 389)">
      <rect width="632" height="205" rx="24" fill="#FFFFFF" stroke="#CBE1DC"/>
      <rect width="12" height="205" rx="6" fill="#E36B50"/>
      <text x="42" y="46" fill="#D35A41" font-size="15" font-weight="750" letter-spacing="2">DATA &amp; INTEGRITY</text>
      <text x="42" y="88" fill="#173C3A" font-size="27" font-weight="760">PodiumDB</text>
      <text x="42" y="128" fill="#4A6864" font-size="18">MySQL 8.4 · normalized model · validated writes</text>
      <text x="42" y="160" fill="#4A6864" font-size="18">Audit trail · analytical views · transactional Python CLI</text>
    </g>
